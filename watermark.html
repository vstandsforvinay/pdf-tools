<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>PDF Watermark — PDF Tools</title>
<link rel="stylesheet" href="shared.css"/>
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg"/>
</head>
<body>
<nav class="top-nav"><a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> All Tools</a></nav>
<div class="tool-header">
  <h1>&#128167; PDF <span>Watermark</span></h1>
  <p>Add text watermarks to every page of your PDF.</p>
</div>
<div class="card">
  <div class="drop-zone" id="w-drop"><input type="file" id="w-file" accept=".pdf"/><div class="icon">&#128167;</div><div class="label">Select a PDF file</div></div>
  <div class="file-info" id="w-info"><div class="fi">&#128206;</div><div class="fd"><div class="fn" id="w-fn"></div><div class="fs" id="w-fs"></div></div><button class="rb" id="w-rm">&times;</button></div>
  <div class="field" id="w-opts">
    <label>Watermark text</label>
    <div class="field-row"><input type="text" id="w-text" placeholder="CONFIDENTIAL" value="CONFIDENTIAL"/></div>
    <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;align-items:center">
      <span style="font-size:.78rem;color:var(--text-muted)">Size</span>
      <input type="number" id="w-size" value="50" min="10" max="200" style="width:60px;padding:.4rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem"/>
      <span style="font-size:.78rem;color:var(--text-muted)">Color</span>
      <input type="color" id="w-color" value="#ff0000" style="width:36px;height:30px;padding:2px;cursor:pointer;border:1px solid var(--border);border-radius:6px"/>
      <span style="font-size:.78rem;color:var(--text-muted)">Opacity</span>
      <input type="range" id="w-opacity" min="5" max="100" value="25" style="flex:1;min-width:60px;accent-color:var(--primary)"/>
      <span id="w-opacity-val" style="font-size:.75rem;color:var(--primary)">25%</span>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;align-items:center">
      <span style="font-size:.78rem;color:var(--text-muted)">Rotation</span>
      <input type="range" id="w-rotation" min="-90" max="90" value="-45" style="flex:1;min-width:80px;accent-color:var(--primary)"/>
      <span id="w-rotation-val" style="font-size:.75rem;color:var(--primary)">-45°</span>
    </div>
  </div>
  <button class="action-btn" id="w-btn">&#128167; Add Watermark</button>
  <div class="progress-container" id="w-prog"><div class="progress-bar-bg"><div class="progress-bar" id="w-bar"></div></div><div class="progress-text" id="w-ptxt"></div></div>
  <div class="status" id="w-status"></div>
  <div class="preview-area" id="w-preview"><canvas id="w-canvas"></canvas></div>
  <a class="download-btn" id="w-dl" download>&#11015; Download Watermarked PDF</a>
</div>
<footer><div class="footer-tagline">PDF Tools &mdash; Your files never leave your device.</div></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
var pdfjsLib=window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
var jsPDF=window.jspdf.jsPDF;
function fmt(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function $(id){return document.getElementById(id);}
function show(el){el.classList.add('visible')}
function hide(el){el.classList.remove('visible')}

var drop=$('w-drop'),fileIn=$('w-file'),info=$('w-info'),fn=$('w-fn'),fs=$('w-fs'),rm=$('w-rm'),
    optsField=$('w-opts'),textIn=$('w-text'),sizeIn=$('w-size'),colorIn=$('w-color'),
    opacityIn=$('w-opacity'),opacityVal=$('w-opacity-val'),rotIn=$('w-rotation'),rotVal=$('w-rotation-val'),
    btn=$('w-btn'),prog=$('w-prog'),bar=$('w-bar'),ptxt=$('w-ptxt'),
    status=$('w-status'),dl=$('w-dl'),preview=$('w-preview'),canvas=$('w-canvas'),file=null;

function setStatus(m,t){status.textContent=m;status.className='status visible '+t;}
function setP(p,t){bar.style.width=p+'%';ptxt.textContent=t;}
opacityIn.addEventListener('input',function(){opacityVal.textContent=this.value+'%';});
rotIn.addEventListener('input',function(){rotVal.textContent=this.value+'°';});

function onFile(f){
  if(!f)return;file=f;fn.textContent=f.name;fs.textContent=fmt(f.size);
  show(info);show(optsField);show(btn);drop.style.display='none';
  status.className='status';hide(dl);preview.classList.remove('visible');
}
function reset(){file=null;fileIn.value='';hide(info);hide(optsField);hide(btn);hide(prog);hide(dl);status.className='status';drop.style.display='';preview.classList.remove('visible');}

fileIn.addEventListener('change',function(e){if(e.target.files.length)onFile(e.target.files[0]);});
drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('dragover');});
drop.addEventListener('dragleave',function(){drop.classList.remove('dragover');});
drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('dragover');if(e.dataTransfer.files.length)onFile(e.dataTransfer.files[0]);});
rm.addEventListener('click',reset);

function hexToRgb(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r:r,g:g,b:b};}

btn.addEventListener('click',async function(){
  if(!file)return;var wmText=textIn.value.trim();
  if(!wmText){setStatus('Enter watermark text.','error');return;}
  btn.disabled=true;btn.textContent='\u23F3 Processing...';show(prog);hide(dl);preview.classList.remove('visible');
  status.className='status';setP(5,'Loading...');
  try{
    var ab=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    var total=pdf.numPages;var doc=null;
    var wmSize=parseInt(sizeIn.value)||50;var wmColor=hexToRgb(colorIn.value);
    var wmOpacity=parseInt(opacityIn.value)/100;var wmRot=parseInt(rotIn.value);
    for(var i=1;i<=total;i++){
      setP(5+Math.round(i/total*80),'Page '+i+'/'+total);
      var page=await pdf.getPage(i);var vp=page.getViewport({scale:1});
      var sc=Math.max(vp.width,vp.height)>1200?2:3;var viewport=page.getViewport({scale:sc});
      var c=document.createElement('canvas');c.width=viewport.width;c.height=viewport.height;
      var cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);
      await page.render({canvasContext:cx,viewport:viewport}).promise;
      // Draw watermark on canvas
      cx.save();cx.globalAlpha=wmOpacity;
      cx.translate(c.width/2,c.height/2);cx.rotate(wmRot*Math.PI/180);
      cx.font='bold '+(wmSize*sc)+'px sans-serif';cx.fillStyle='rgb('+wmColor.r+','+wmColor.g+','+wmColor.b+')';
      cx.textAlign='center';cx.textBaseline='middle';cx.fillText(wmText,0,0);cx.restore();
      var img=c.toDataURL('image/jpeg',0.92);var wPt=vp.width*.75,hPt=vp.height*.75;
      if(i===1)doc=new jsPDF({orientation:wPt>hPt?'l':'p',unit:'pt',format:[wPt,hPt]});
      else doc.addPage([wPt,hPt],wPt>hPt?'l':'p');
      doc.addImage(img,'JPEG',0,0,wPt,hPt);
    }
    setP(90,'Finalizing...');
    var blob=doc.output('blob');var url=URL.createObjectURL(blob);
    dl.href=url;dl.download=file.name.replace(/\.pdf$/i,'')+'_watermarked.pdf';show(dl);
    // Preview
    var prevPdf=await pdfjsLib.getDocument({data:new Uint8Array(await blob.arrayBuffer())}).promise;
    var p1=await prevPdf.getPage(1);var pvp=p1.getViewport({scale:1});var pw=preview.clientWidth||400;
    var psc=(pw/pvp.width)*2;var pvp2=p1.getViewport({scale:psc});
    canvas.width=pvp2.width;canvas.height=pvp2.height;canvas.style.width=pw+'px';
    canvas.style.height=Math.round(pw*(pvp.height/pvp.width))+'px';
    var pctx=canvas.getContext('2d');pctx.fillStyle='#fff';pctx.fillRect(0,0,canvas.width,canvas.height);
    await p1.render({canvasContext:pctx,viewport:pvp2}).promise;preview.classList.add('visible');
    setP(100,'Done!');setStatus('Watermarked '+total+' page(s) · '+fmt(blob.size),'success');
  }catch(err){console.error(err);setStatus('Error: '+(err.message||err),'error');hide(prog);
  }finally{btn.disabled=false;btn.textContent='\uD83D\uDCA7 Add Watermark';}
});
})();
</script>
</body>
</html>
