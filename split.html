<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>Split PDF â€” PDF Tools</title>
<link rel="stylesheet" href="shared.css"/>
<link rel="icon" type="image/svg+xml" href="icons/icon-192.svg"/>
</head>
<body>
<nav class="top-nav"><a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> All Tools</a></nav>
<div class="tool-header">
  <h1>&#9986; Split <span>PDF</span></h1>
  <p>Extract specific pages or split into separate files.</p>
</div>
<div class="card">
  <div class="drop-zone" id="s-drop"><input type="file" id="s-file" accept=".pdf"/><div class="icon">&#9986;</div><div class="label">Select a PDF file</div></div>
  <div class="file-info" id="s-info"><div class="fi">&#128206;</div><div class="fd"><div class="fn" id="s-fn"></div><div class="fs" id="s-fs"></div></div><button class="rb" id="s-rm">&times;</button></div>
  <div class="field" id="s-pages-field">
    <label for="s-pages">Pages to extract (e.g. 1,3,5-8)</label>
    <div class="field-row"><input type="text" id="s-pages" placeholder="1-3, 5, 7-10"/></div>
    <div style="font-size:.72rem;color:var(--text-muted);margin-top:.3rem" id="s-total-info"></div>
  </div>
  <button class="action-btn" id="s-btn">&#9986; Extract Pages</button>
  <div class="progress-container" id="s-prog"><div class="progress-bar-bg"><div class="progress-bar" id="s-bar"></div></div><div class="progress-text" id="s-ptxt"></div></div>
  <div class="status" id="s-status"></div>
  <a class="download-btn" id="s-dl" download>&#11015; Download Extracted PDF</a>
</div>
<footer><div class="footer-tagline">PDF Tools &mdash; Your files never leave your device.</div></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function(){
var pdfjsLib=window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
var jsPDF=window.jspdf.jsPDF;
function fmt(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function $(id){return document.getElementById(id);}
function show(el){el.classList.add('visible')}
function hide(el){el.classList.remove('visible')}

var drop=$('s-drop'),fileIn=$('s-file'),info=$('s-info'),fn=$('s-fn'),fs=$('s-fs'),rm=$('s-rm'),
    pagesField=$('s-pages-field'),pagesIn=$('s-pages'),totalInfo=$('s-total-info'),
    btn=$('s-btn'),prog=$('s-prog'),bar=$('s-bar'),ptxt=$('s-ptxt'),
    status=$('s-status'),dl=$('s-dl'),file=null,totalPages=0;

function setStatus(m,t){status.textContent=m;status.className='status visible '+t;}
function setP(p,t){bar.style.width=p+'%';ptxt.textContent=t;}

function parsePages(str,max){
  var pages=[];var parts=str.split(',');
  for(var i=0;i<parts.length;i++){
    var p=parts[i].trim();if(!p)continue;
    if(p.indexOf('-')>-1){
      var range=p.split('-');var a=parseInt(range[0]),b=parseInt(range[1]);
      if(isNaN(a)||isNaN(b))continue;
      for(var j=Math.max(1,a);j<=Math.min(max,b);j++)if(pages.indexOf(j)===-1)pages.push(j);
    }else{var n=parseInt(p);if(!isNaN(n)&&n>=1&&n<=max&&pages.indexOf(n)===-1)pages.push(n);}
  }
  return pages.sort(function(a,b){return a-b;});
}

function onFile(f){
  if(!f)return;file=f;fn.textContent=f.name;fs.textContent=fmt(f.size);
  show(info);show(pagesField);show(btn);drop.style.display='none';
  status.className='status';hide(dl);hide(prog);
  // Count pages
  f.arrayBuffer().then(function(ab){
    return pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
  }).then(function(pdf){
    totalPages=pdf.numPages;totalInfo.textContent='Total pages: '+totalPages;
    pagesIn.placeholder='1-'+totalPages;
  });
}
function reset(){file=null;fileIn.value='';hide(info);hide(pagesField);hide(btn);hide(prog);hide(dl);status.className='status';drop.style.display='';totalPages=0;pagesIn.value='';}

fileIn.addEventListener('change',function(e){if(e.target.files.length)onFile(e.target.files[0]);});
drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('dragover');});
drop.addEventListener('dragleave',function(){drop.classList.remove('dragover');});
drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('dragover');if(e.dataTransfer.files.length)onFile(e.dataTransfer.files[0]);});
rm.addEventListener('click',reset);

btn.addEventListener('click',async function(){
  if(!file||!totalPages)return;
  var pages=parsePages(pagesIn.value,totalPages);
  if(pages.length===0){setStatus('Enter valid page numbers.','error');return;}
  btn.disabled=true;btn.textContent='\u23F3 Extracting...';show(prog);hide(dl);
  status.className='status';setP(5,'Loading...');
  try{
    var ab=await file.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    var doc=null;
    for(var i=0;i<pages.length;i++){
      setP(5+Math.round(i/pages.length*85),'Page '+pages[i]+'...');
      var page=await pdf.getPage(pages[i]);var vp=page.getViewport({scale:1});
      var sc=Math.max(vp.width,vp.height)>1200?2:3;var viewport=page.getViewport({scale:sc});
      var c=document.createElement('canvas');c.width=viewport.width;c.height=viewport.height;
      var cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);
      await page.render({canvasContext:cx,viewport:viewport}).promise;
      var img=c.toDataURL('image/jpeg',0.92);var wPt=vp.width*.75,hPt=vp.height*.75;
      if(!doc)doc=new jsPDF({orientation:wPt>hPt?'l':'p',unit:'pt',format:[wPt,hPt]});
      else doc.addPage([wPt,hPt],wPt>hPt?'l':'p');
      doc.addImage(img,'JPEG',0,0,wPt,hPt);
    }
    setP(95,'Finalizing...');
    var blob=doc.output('blob');var url=URL.createObjectURL(blob);
    dl.href=url;dl.download=file.name.replace(/\.pdf$/i,'')+'_pages.pdf';show(dl);
    setP(100,'Done!');setStatus('Extracted '+pages.length+' page(s) Â· '+fmt(blob.size),'success');
  }catch(err){console.error(err);setStatus('Error: '+(err.message||err),'error');hide(prog);
  }finally{btn.disabled=false;btn.textContent='\u2702 Extract Pages';}
});
})();
</script>
</body>
</html>
